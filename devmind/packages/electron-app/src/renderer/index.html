<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cycy DevMind</title>
    <!-- macOS specific app region for drag -->
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: #1e1e1e;
        color: #d4d4d4;
        overflow: hidden;
      }
      #titlebar {
        height: 38px;
        -webkit-app-region: drag;
        width: 100%;
        position: absolute;
        top: 0;
        z-index: 9999;
      }
    </style>
  </head>
  <body>
    <div id="titlebar"></div>
    <div id="root" style="padding-top: 38px; height: calc(100vh - 38px);"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
