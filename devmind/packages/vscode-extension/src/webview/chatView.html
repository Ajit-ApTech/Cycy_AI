<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycy AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --panel-bg: rgba(26, 26, 26, 0.85); /* For glassmorphism */
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #e0e0e0;
            --text-muted: #8a8a8a;
            --accent: #3b82f6; /* Modern blue */
            --accent-glow: rgba(59, 130, 246, 0.5);
            --user-bubble: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            --ai-bubble: transparent;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --heading-font: 'Outfit', sans-serif;
            --code-bg: #141414;
            --code-border: #262626;
            --glass-bg: rgba(20, 20, 20, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        html {
            height: 100vh;
            overflow: hidden;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
        }

        /* Header */
        .header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .app-title {
            font-family: var(--heading-font);
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #fff, #999);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            color: #ccc;
            transition: all 0.2s;
        }

        .badge:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .badge-provider.configured {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        /* Chat Area */
        .chat-area {
            flex: 1 1 0;
            min-height: 0;
            overflow-y: scroll;
            -webkit-overflow-scrolling: touch;
            padding: 12px 14px;
        }

        .chat-area::-webkit-scrollbar {
            width: 6px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }

        .chat-area::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            gap: 16px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        .empty-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3);
            margin-bottom: 8px;
        }

        /* Messages */
        .message {
            display: flex;
            flex-direction: column;
            margin-bottom: 6px;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .message.user {
            align-items: flex-end;
        }

        .bubble-user {
            background: var(--user-bubble);
            color: #fff;
            padding: 10px 14px;
            border-radius: 18px 18px 4px 18px;
            max-width: 85%;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.2);
        }

        .bubble-assistant {
            width: 100%;
            max-width: 100%;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-main);
        }

        .assistant-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .assistant-avatar {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d1b2e 40%, #4a1942 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 13px;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(74, 25, 66, 0.4);
        }

        .assistant-name {
            font-family: var(--heading-font);
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Markdown Parsing Styles */
        pre {
            background: var(--code-bg);
            border-radius: 10px;
            padding: 12px;
            margin: 12px 0;
            font-size: 13px;
            overflow-x: auto;
            border: 1px solid var(--code-border);
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            position: relative;
        }

        code {
            font-family: inherit;
        }

        .inline-code {
            background: rgba(255, 255, 255, 0.08);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
            font-family: monospace;
            color: #ec4899; /* pinkish for visibility */
        }

        /* Thinking UI */
        .thought-block {
            background: rgba(244, 114, 182, 0.04);
            border: 1px solid rgba(244, 114, 182, 0.15);
            border-radius: 12px;
            margin: 6px 0;
            overflow: visible;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .thought-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            cursor: pointer;
            user-select: none;
            background: linear-gradient(135deg, rgba(244, 114, 182, 0.08) 0%, rgba(168, 85, 247, 0.08) 100%);
            transition: background 0.2s;
        }

        .thought-header:hover {
            background: linear-gradient(135deg, rgba(244, 114, 182, 0.14) 0%, rgba(168, 85, 247, 0.14) 100%);
        }

        .thought-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 600;
            color: #f9a8d4;
        }

        .thought-title i {
            color: #f472b6;
        }

        .thought-content {
            padding: 10px 14px;
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.5;
            white-space: pre-wrap;
            border-top: 1px solid rgba(244, 114, 182, 0.1);
            background: rgba(0, 0, 0, 0.15);
            max-height: 40vh;
            overflow-y: auto;
        }

        .thought-content::-webkit-scrollbar {
            width: 4px;
        }

        .thought-content::-webkit-scrollbar-thumb {
            background: rgba(244, 114, 182, 0.3);
            border-radius: 4px;
        }

        .thought-block.collapsed .thought-content {
            display: none;
        }

        .thought-block.collapsed .chevron {
            transform: rotate(-90deg);
        }

        .chevron {
            transition: transform 0.3s;
            color: #f9a8d4;
        }

        .tool-block {
            background: var(--code-bg);
            border: 1px solid var(--code-border);
            border-radius: 8px;
            margin: 6px 0;
            font-size: 12px;
            color: var(--text-muted);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .tool-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            cursor: pointer;
            user-select: none;
            background: rgba(255, 255, 255, 0.02);
        }

        .tool-header:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .tool-details {
            padding: 0 14px 10px 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.2);
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 11px;
            color: #a3a3a3;
            max-height: 250px;
            overflow-y: auto;
        }

        .tool-details::-webkit-scrollbar {
            width: 4px;
        }

        .tool-details::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        .tool-block.collapsed .tool-details {
            display: none;
        }

        .tool-block.collapsed .tool-chevron {
            transform: rotate(-90deg);
        }

        .tool-chevron {
            transition: transform 0.3s;
            margin-left: auto;
            color: var(--text-muted);
        }

        /* Activity Status Bar */
        .activity-bar {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%) translateY(-150%);
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: #fff;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            z-index: 50;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        .activity-bar.visible {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .activity-spinner {
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* Input Area */
        .input-area {
            border-top: 1px solid var(--border-color);
            padding: 16px;
            flex-shrink: 0;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .input-wrapper {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-wrapper:focus-within,
        .input-wrapper.focused {
            border-color: rgba(59, 130, 246, 0.4);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.05);
        }

        .input-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            resize: none;
            outline: none;
            font-size: 14px;
            line-height: 1.5;
            min-height: 24px;
            max-height: 200px;
            font-family: inherit;
            padding: 4px 0;
        }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .send-btn, .stop-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .send-btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
        }

        .send-btn.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
        }

        .stop-btn {
            background: #ef4444;
            color: white;
        }

        .shortcut-hint {
            font-size: 11px;
            color: var(--text-muted);
            text-align: right;
            margin-top: 6px;
        }

        /* Settings Overlay */
        .settings-overlay {
            position: absolute;
            inset: 0;
            background: rgba(13, 13, 13, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: none;
            flex-direction: column;
            padding: 24px;
            gap: 20px;
            overflow-y: auto;
            animation: fadeIn 0.3s ease-out;
        }

        .settings-overlay.show {
            display: flex;
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .settings-header h2 {
            margin: 0;
            font-family: var(--heading-font);
            font-size: 18px;
        }

        .settings-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .settings-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .provider-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .provider-btn {
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-main);
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .provider-btn.active {
            background: rgba(59, 130, 246, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        input.settings-input,
        select.settings-select {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-main);
            padding: 12px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        input.settings-input:focus {
            border-color: var(--accent);
        }

        .primary-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .primary-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
            font-size: 13px;
            padding: 4px 8px;
        }

        .dots {
            display: flex;
            gap: 4px;
        }

        .dots div {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 1.4s infinite ease-in-out both;
        }

        .dots div:nth-child(1) { animation-delay: -0.32s; }
        .dots div:nth-child(2) { animation-delay: -0.16s; }

        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        .image-preview-container {
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            overflow-x: auto;
            border-bottom: 1px solid var(--border-color);
        }
        .image-preview-container:empty {
            display: none;
        }
        .image-preview-item {
            position: relative;
            width: 48px;
            height: 48px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
        }
        .image-preview-item .remove-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 10px;
        }
        .attach-btn {
            background: transparent;
            border: none;
            padding: 6px;
            margin-right: 4px;
            cursor: pointer;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .attach-btn:hover { background: rgba(255, 255, 255, 0.05); }

        .user-images {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 6px;
            justify-content: flex-end;
        }
        .user-images img {
            width: auto;
            max-width: 200px;
            height: auto;
            max-height: 120px;
            border-radius: 8px;
            object-fit: contain;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="assistant-avatar" style="width:28px;height:28px;">🌸</div>
            <span class="app-title">Cycy AI</span>

            <!-- Mode Picker -->
            <div style="position: relative;">
                <button id="mode-btn" class="badge" onclick="toggleModeMenu(event)" style="color: #61afef;">
                    <i id="mode-icon" data-lucide="zap" style="width:12px;height:12px;"></i>
                    <span id="mode-label">Fast</span>
                    <i data-lucide="chevron-down" style="width:10px;height:10px;margin-left:2px;"></i>
                </button>
                <div id="mode-menu"
                    style="display: none; position: absolute; top: 115%; left: 0; background: #1a1a1a; border: 1px solid var(--border-color); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100; min-width: 180px; overflow: hidden; flex-direction: column; backdrop-filter: blur(10px);">
                    <button class="mode-option" onclick="selectMode('fast')"
                        style="display: flex; flex-direction: column; width: 100%; text-align: left; padding: 12px; border: none; cursor: pointer; color: #fff; background: rgba(255,255,255,0.05);">
                        <span
                            style="display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600;"><i
                                data-lucide="zap" style="width:14px;height:14px;color:#e5c07b"></i> Fast Mode</span>
                        <span style="font-size: 11px; color: #888; margin-top: 2px;">Instant responses for quick tasks</span>
                    </button>
                    <button class="mode-option" onclick="selectMode('plan')"
                        style="display: flex; flex-direction: column; width: 100%; text-align: left; padding: 12px; background: transparent; border: none; cursor: pointer; color: #ccc;">
                        <span
                            style="display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600;"><i
                                data-lucide="map" style="width:14px;height:14px;color:#61afef"></i> Plan Mode</span>
                        <span style="font-size: 11px; color: #888; margin-top: 2px;">Complex logic & step-by-step reasoning</span>
                    </button>
                </div>
            </div>

            <button id="provider-badge" class="badge badge-provider" onclick="toggleSettings(true)">
                <i data-lucide="settings" style="width:12px;height:12px;"></i> Setup
            </button>
        </div>
        <button class="icon-btn" onclick="clearHistory()" title="Clear Chat">
            <i data-lucide="trash-2" style="width:16px;height:16px;"></i>
        </button>
    </div>

    <!-- Floating Activity Bar -->
    <div id="activity-bar" class="activity-bar">
        <div class="activity-spinner"></div>
        <span id="activity-text">Thinking...</span>
    </div>

    <!-- Chat Area -->
    <div class="chat-area" id="chat-container">
        <div class="empty-state" id="empty-state">
            <div class="empty-icon"><i data-lucide="brain"></i></div>
            <div style="font-family: var(--heading-font); font-size: 18px; font-weight: 600; color: #fff;">How can I help you today?</div>
            <div style="font-size: 13px; color: var(--text-muted); max-width: 200px;">Ask me to write code, debug, or explain concepts.</div>
            <div id="setup-hint"
                style="margin-top: 10px; font-size: 12px; color: var(--accent); cursor: pointer; font-weight: 500;"
                onclick="toggleSettings(true)">Configure AI provider to start →</div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <div class="input-wrapper" style="flex-direction: column;">
            <div id="image-preview-container" class="image-preview-container"></div>
            <div class="input-row" style="padding-top: 6px; padding-bottom: 6px;">
                <input type="file" id="image-upload" accept="image/*" multiple style="display: none;">
                <button class="attach-btn" onclick="document.getElementById('image-upload').click()" title="Attach image">
                    <i data-lucide="paperclip" style="width:18px;height:18px;color:var(--text-muted)"></i>
                </button>
                <textarea id="chat-input" rows="1" placeholder="Type a message..." disabled></textarea>
                <div class="action-btns">
                    <button id="send-btn" class="send-btn" title="Send (Enter)">
                        <i data-lucide="arrow-up" style="width:18px;height:18px;"></i>
                    </button>
                    <button id="stop-btn" class="stop-btn" style="display: none;" title="Stop generation">
                        <i data-lucide="square" style="width:14px;height:14px;fill:currentColor"></i>
                    </button>
                </div>
            </div>
        </div>
        <div class="shortcut-hint"><b>Enter</b> to send · <b>Shift+Enter</b> for newline</div>
    </div>

    <!-- Settings Overlay -->
    <div class="settings-overlay" id="settings-overlay">
        <div class="settings-header">
            <h2>AI Provider Settings</h2>
            <button class="icon-btn" onclick="toggleSettings(false)"><i data-lucide="x" style="width:20px;height:20px;"></i></button>
        </div>

        <div class="settings-group">
            <label class="settings-label">Select Provider</label>
            <div id="provider-list" class="provider-grid"></div>
        </div>

        <div class="settings-group">
            <label class="settings-label">API Key</label>
            <input type="password" id="api-key-input" class="settings-input" placeholder="••••••••••••••••">
            <div style="font-size: 11px; color: var(--text-muted); display:flex; align-items:center; gap:4px;">
                <i data-lucide="shield-check" style="width:12px;"></i> Stored securely in VS Code.
            </div>
        </div>

        <div style="display: flex; gap: 8px;">
            <button class="badge" onclick="fetchModels()" style="flex: 1; justify-content: center; padding: 10px;">
                <i data-lucide="refresh-cw" style="width:12px;"></i> Fetch Models
            </button>
        </div>

        <div class="settings-group">
            <label class="settings-label">Model</label>
            <select id="model-select" class="settings-select" style="margin-bottom: 8px;"></select>
        </div>

        <!-- Ollama Advanced Settings -->
        <div id="ollama-advanced" style="display: none; flex-direction: column; gap: 12px; margin-top: 4px; padding: 12px; background: rgba(255,255,255,0.02); border: 1px solid var(--border-color); border-radius: 10px; margin-bottom: 15px;">
            <div class="settings-group">
                <label class="settings-label" style="font-size: 11px; opacity: 0.8;">Ollama Server URL</label>
                <input type="text" id="ollama-url-input" class="settings-input" placeholder="http://localhost:11434">
            </div>
            <div class="settings-group" style="margin-bottom: 0;">
                <label class="settings-label" style="font-size: 11px; opacity: 0.8;">Custom Headers (JSON)</label>
                <input type="text" id="custom-headers-input" class="settings-input" placeholder='{"X-Workspace-ID": "..."}'>
            </div>
        </div>

        <button class="primary-btn" onclick="applySettings()">Save Configuration</button>
    </div>

    <script>
        lucide.createIcons();
        const vscode = acquireVsCodeApi();

        const PROVIDERS = {
            nvidia: { label: '⚡ NVIDIA NIM', defaultModels: ['meta/llama-3.1-405b-instruct', 'mistralai/mixtral-8x22b-instruct-v0.1'], needsKey: true },
            gemini: { label: '✦ Google Gemini', defaultModels: ['gemini-2.0-flash', 'gemini-1.5-pro'], needsKey: true },
            openai: { label: '◎ OpenAI', defaultModels: ['gpt-4o', 'gpt-4o-mini'], needsKey: true },
            groq: { label: '⚡ Groq (Fast)', defaultModels: ['llama-3.3-70b-versatile'], needsKey: true },
            ollama: { label: '🖥 Ollama (Local)', defaultModels: ['llama3.2', 'qwen2.5-coder'], needsKey: true }
        };

        let currentProvider = 'gemini';
        let currentModel = '';
        let currentOllamaUrl = 'http://localhost:11434';
        let currentCustomHeaders = '';
        let isConfigured = false;
        let isStreaming = false;

        // Elements
        const chatContainer = document.getElementById('chat-container');
        const emptyState = document.getElementById('empty-state');
        const inputEl = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const stopBtn = document.getElementById('stop-btn');
        const settingsOverlay = document.getElementById('settings-overlay');
        const providerBadge = document.getElementById('provider-badge');
        const setupHint = document.getElementById('setup-hint');

        // State & initialization
        let messages = [];
        let currentAssistantMessageDiv = null;
        let currentRawContent = '';
        let currentThinkingDiv = null;
        let currentThinkingRaw = '';
        let currentMode = 'fast';
        let activeToolStates = new Map();

        // Activity Bar Helper
        function updateActivityBar() {
            const bar = document.getElementById('activity-bar');
            const txt = document.getElementById('activity-text');
            
            if (activeToolStates.size === 0) {
                bar.classList.remove('visible');
            } else {
                // Get the most recently added tool label
                const names = Array.from(activeToolStates.keys());
                const lastLabel = activeToolStates.get(names[names.length - 1]);
                txt.textContent = `${lastLabel}...`;
                bar.classList.add('visible');
            }
        }

        window.addEventListener('message', event => {
            const msg = event.data;
            switch (msg.type) {
                case 'init':
                    if (msg.config.provider && PROVIDERS[msg.config.provider]) {
                        currentProvider = msg.config.provider;
                        currentModel = msg.config.model;
                        currentOllamaUrl = msg.config.ollamaUrl || 'http://localhost:11434';
                        currentCustomHeaders = msg.config.customHeaders || '';
                        
                        if (msg.config.hasKey || !PROVIDERS[currentProvider].needsKey) {
                            setConfiguredState(true);
                        }
                    }
                    renderSettings();
                    break;
                case 'modelsFetched':
                    const select = document.getElementById('model-select');
                    select.innerHTML = '';
                    msg.models.forEach(m => {
                        const opt = document.createElement('option');
                        opt.value = m;
                        opt.textContent = m;
                        select.appendChild(opt);
                    });
                    if (msg.models.length > 0) {
                        select.value = msg.models[0];
                        currentModel = msg.models[0];
                    }
                    break;
                case 'token':
                    collapseThinkingBlock();
                    appendAssistantToken(msg.value);
                    break;
                case 'thinkingToken':
                    appendThinkingToken(msg.value);
                    break;
                case 'error':
                    isStreaming = false;
                    appendSystemMessage(`Error: ${msg.value}`, true);
                    setStreamingState(false);
                    break;
                case 'stopStreaming':
                    isStreaming = false;
                    setStreamingState(false);
                    collapseThinkingBlock();
                    activeToolStates.clear();
                    updateActivityBar();
                    break;
                case 'toolStart':
                    collapseThinkingBlock();
                    appendToolBlock(msg.name, msg.args, true);
                    break;
                case 'toolEnd':
                    appendToolBlock(msg.name, msg.args, false, msg.result);
                    break;
                case 'confirmCommand':
                    collapseThinkingBlock();
                    appendCommandConfirmation(msg.id, msg.name, msg.args);
                    break;
            }
        });

        // Resolve confirmation
        window.resolveConfirmation = function(id, approved, blockId) {
            const block = document.getElementById(blockId);
            if (block) {
                if (approved) {
                    block.innerHTML = `<div style="display:flex;align-items:center;gap:8px;color:#10b981;font-size:12px;"><i data-lucide="check" style="width:14px;"></i> Command Approved</div>`;
                } else {
                    block.innerHTML = `<div style="display:flex;align-items:center;gap:8px;color:#ef4444;font-size:12px;"><i data-lucide="x" style="width:14px;"></i> Command Rejected</div>`;
                }
                lucide.createIcons();
            }
            vscode.postMessage({ type: 'resolveConfirmation', id, approved });
        };

        function appendCommandConfirmation(id, name, args) {
            const ind = document.getElementById('typing-indicator');
            const parent = ind ? chatContainer.insertBefore(document.createElement('div'), ind) : chatContainer.appendChild(document.createElement('div'));
            
            const blockId = `confirm-${id}`;
            const command = args.command || args.CommandLine || '';
            
            parent.className = 'message assistant';
            parent.innerHTML = `
                <div class="tool-block" style="flex-direction: column; align-items: stretch; border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.05);" id="${blockId}">
                    <div style="display: flex; align-items: center; gap: 8px; color: #fca5a5; font-weight: 600; margin-bottom: 8px;">
                        <i data-lucide="shield-alert" style="width:16px;"></i> Permission Required
                    </div>
                    <div style="font-size: 11px; color: #ccc; margin-bottom: 8px;">Cycy AI wants to run a shell command:</div>
                    <pre style="margin:0 0 12px 0; padding:8px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); border-radius: 6px;"><code>${command.replace(/</g, '&lt;')}</code></pre>
                    <div style="display: flex; gap: 8px;">
                        <button class="primary-btn" style="flex: 1; padding: 8px; font-size: 11px; margin: 0; background: #10b981;" onclick="resolveConfirmation('${id}', true, '${blockId}')">Approve</button>
                        <button class="badge" style="flex: 1; justify-content: center; padding: 8px; font-size: 11px; border-color: #ef4444; color: #fca5a5;" onclick="resolveConfirmation('${id}', false, '${blockId}')">Reject</button>
                    </div>
                </div>
            `;
            lucide.createIcons();
            scrollToBottom();
        }

        function toggleModeMenu(e) {
            e?.stopPropagation();
            const menu = document.getElementById('mode-menu');
            menu.style.display = menu.style.display === 'none' ? 'flex' : 'none';
        }

        function selectMode(newMode) {
            const btn = document.getElementById('mode-btn');
            const icon = document.getElementById('mode-icon');
            const label = document.getElementById('mode-label');
            const options = document.querySelectorAll('.mode-option');

            currentMode = newMode;
            if (newMode === 'fast') {
                btn.style.color = '#e5c07b';
                label.innerText = 'Fast';
                icon.setAttribute('data-lucide', 'zap');
                options[0].style.backgroundColor = 'rgba(255,255,255,0.05)';
                options[1].style.backgroundColor = 'transparent';
                appendSystemMessage('Switched to Fast mode.');
            } else {
                btn.style.color = '#61afef';
                label.innerText = 'Plan';
                icon.setAttribute('data-lucide', 'map');
                options[0].style.backgroundColor = 'transparent';
                options[1].style.backgroundColor = 'rgba(255,255,255,0.05)';
                appendSystemMessage('Switched to Plan mode. (Step-by-step reasoning)');
            }

            lucide.createIcons();
            document.getElementById('mode-menu').style.display = 'none';
        }

        // Close mode menu on outside click
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('mode-menu');
            if (menu && menu.style.display !== 'none' && !e.target.closest('#mode-btn')) {
                menu.style.display = 'none';
            }
        });

        // Setup UI
        function toggleSettings(show) {
            settingsOverlay.classList.toggle('show', show);
            if (show) renderSettings();
        }

        function renderSettings() {
            const pl = document.getElementById('provider-list');
            pl.innerHTML = '';
            for (const [key, p] of Object.entries(PROVIDERS)) {
                const btn = document.createElement('div');
                btn.className = `provider-btn ${key === currentProvider ? 'active' : ''}`;
                btn.innerHTML = `${key === currentProvider ? '<i data-lucide="check" style="width:14px;color:var(--accent)"></i> ' : ''}${p.label}`;
                btn.onclick = () => { currentProvider = key; renderSettings(); };
                pl.appendChild(btn);
            }
            lucide.createIcons();

            const models = PROVIDERS[currentProvider].defaultModels;
            const select = document.getElementById('model-select');
            if (select.options.length === 0 || !models.includes(select.value)) {
                select.innerHTML = models.map(m => `<option value="${m}">${m}</option>`).join('');
                if (!currentModel || !models.includes(currentModel)) currentModel = models[0];
                select.value = currentModel;
            }

            document.getElementById('api-key-input').disabled = !PROVIDERS[currentProvider].needsKey;
            document.getElementById('api-key-input').placeholder = PROVIDERS[currentProvider].needsKey ? 'Enter API Key' : 'No key needed';
            
            // Ollama Advanced
            const ollamaAdv = document.getElementById('ollama-advanced');
            ollamaAdv.style.display = currentProvider === 'ollama' ? 'flex' : 'none';
            document.getElementById('ollama-url-input').value = currentOllamaUrl;
            document.getElementById('custom-headers-input').value = currentCustomHeaders;
        }

        function fetchModels() {
            const key = document.getElementById('api-key-input').value;
            const ollamaUrl = document.getElementById('ollama-url-input').value;
            const customHeaders = document.getElementById('custom-headers-input').value;
            vscode.postMessage({ 
                type: 'fetchModels', 
                provider: currentProvider, 
                apiKey: key,
                ollamaUrl: ollamaUrl,
                customHeaders: customHeaders
            });
        }

        function applySettings() {
            const key = document.getElementById('api-key-input').value;
            const model = document.getElementById('model-select').value;
            const ollamaUrl = document.getElementById('ollama-url-input').value;
            const customHeaders = document.getElementById('custom-headers-input').value;

            if (PROVIDERS[currentProvider].needsKey && !key && !isConfigured && currentProvider !== 'ollama') {
                alert('Please enter an API Key');
                return;
            }
            
            currentModel = model;
            currentOllamaUrl = ollamaUrl;
            currentCustomHeaders = customHeaders;

            vscode.postMessage({ 
                type: 'setConfig', 
                provider: currentProvider, 
                model: currentModel, 
                apiKey: key,
                ollamaUrl: currentOllamaUrl,
                customHeaders: currentCustomHeaders
            });
            setConfiguredState(true);
            toggleSettings(false);

            appendSystemMessage(`Switched to ${PROVIDERS[currentProvider].label} · ${currentModel}`);
            document.getElementById('api-key-input').value = ''; // clear from UI
        }

        function setConfiguredState(configured) {
            isConfigured = configured;
            if (configured) {
                inputEl.disabled = false;
                inputEl.placeholder = "How can I help you today?";
                providerBadge.classList.add('configured');
                providerBadge.innerHTML = `<i data-lucide="zap" style="width:12px;height:12px;"></i> ${PROVIDERS[currentProvider].label.split(' ').slice(1).join(' ')}`;
                setupHint.style.display = 'none';
            } else {
                inputEl.disabled = true;
                inputEl.placeholder = "Configure a provider first →";
                providerBadge.classList.remove('configured');
                setupHint.style.display = 'block';
            }
            lucide.createIcons();
        }

        // Chat logic
        function clearHistory() {
            chatContainer.innerHTML = '';
            chatContainer.appendChild(emptyState);
            emptyState.style.display = 'flex';
            vscode.postMessage({ type: 'clearHistory' });
            currentAssistantMessageDiv = null;
        }

        let pendingImages = [];

        document.getElementById('image-upload').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    pendingImages.push(ev.target.result);
                    renderImagePreviews();
                };
                reader.readAsDataURL(file);
            });
            this.value = ''; // Reset input
        });

        function renderImagePreviews() {
            const container = document.getElementById('image-preview-container');
            container.innerHTML = '';
            pendingImages.forEach((b64, i) => {
                const div = document.createElement('div');
                div.className = 'image-preview-item';
                div.style.backgroundImage = `url(${b64})`;
                div.innerHTML = `<div class="remove-btn" onclick="removeImage(${i})"><i data-lucide="x" style="width:10px;height:10px"></i></div>`;
                container.appendChild(div);
            });
            lucide.createIcons();
            
            if (pendingImages.length > 0) {
                sendBtn.classList.add('active');
            } else if (inputEl.value.trim() === '') {
                sendBtn.classList.remove('active');
            }
        }

        window.removeImage = function(index) {
            pendingImages.splice(index, 1);
            renderImagePreviews();
        };

        inputEl.addEventListener('input', () => {
            inputEl.style.height = '20px';
            inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
            if (inputEl.value.trim().length > 0 || pendingImages.length > 0) {
                sendBtn.classList.add('active');
            } else {
                sendBtn.classList.remove('active');
            }
        });

        inputEl.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.onclick = sendMessage;
        stopBtn.onclick = () => vscode.postMessage({ type: 'stop' });

        function sendMessage() {
            const text = inputEl.value.trim();
            if ((!text && pendingImages.length === 0) || !isConfigured || isStreaming) return;

            emptyState.style.display = 'none';
            appendUserMessage(text, pendingImages);

            const sentImages = [...pendingImages];
            pendingImages = [];
            renderImagePreviews();

            inputEl.value = '';
            inputEl.style.height = '20px';
            sendBtn.classList.remove('active');

            setStreamingState(true);
            currentAssistantMessageDiv = null;
            currentRawContent = '';
            vscode.postMessage({ type: 'send', message: text, images: sentImages, mode: currentMode });
        }

        function setStreamingState(streaming) {
            isStreaming = streaming;
            sendBtn.style.display = streaming ? 'none' : 'flex';
            stopBtn.style.display = streaming ? 'flex' : 'none';

            if (streaming) {
                const indicator = document.createElement('div');
                indicator.id = 'typing-indicator';
                indicator.className = 'typing-indicator';
                indicator.innerHTML = `<div class="dots"><div></div><div></div><div></div></div> Thinking...`;
                chatContainer.appendChild(indicator);
                scrollToBottom();
            } else {
                const ind = document.getElementById('typing-indicator');
                if (ind) ind.remove();
            }
        }

        function appendUserMessage(text, images = []) {
            const div = document.createElement('div');
            div.className = 'message user';
            
            let html = `<div style="display:flex;flex-direction:column;align-items:flex-end;">`;
            if (text) {
                html += `<div class="bubble-user">${text.replace(/\n/g, '<br/>')}</div>`;
            }
            if (images && images.length > 0) {
                html += `<div class="user-images">` + images.map(img => `<img src="${img}"/>`).join('') + `</div>`;
            }
            html += `</div>`;
            
            div.innerHTML = html;
            chatContainer.appendChild(div);
            scrollToBottom();
        }

        function appendSystemMessage(text) {
            emptyState.style.display = 'none';
            const div = document.createElement('div');
            div.className = 'message system';
            div.textContent = text;
            chatContainer.appendChild(div);
            scrollToBottom();
        }

        function appendToolBlock(name, args, isStart, result = '') {
            collapseThinkingBlock();

            const getToolLabel = (n, a) => {
                const file = a?.TargetFile || a?.AbsolutePath || a?.path || '';
                const base = file ? file.split('/').pop() : '';
                
                switch(n) {
                    case 'write_to_file': return `Writing \`${base}\``;
                    case 'replace_file_content': return `Updating \`${base}\``;
                    case 'multi_replace_file_content': return `Updating \`${base}\``;
                    case 'view_file': return `Reading \`${base}\``;
                    case 'view_code_item': return `Reading \`${a?.ItemName || a?.itemName || base}\``;
                    case 'list_dir': return `Listing \`${a?.DirectoryPath || a?.path || './'}\``;
                    case 'run_command': return `Running \`${a?.CommandLine || a?.command || ''}\``;
                    case 'find_by_name': return `Searching for \`${a?.Pattern || a?.pattern || ''}\``;
                    case 'grep_search': return `Searching codebase...`;
                    default: return `Running \`${n}\``;
                }
            };

            const label = getToolLabel(name, args);
            const ind = document.getElementById('typing-indicator');

            let formattedArgs = '';
            try {
                formattedArgs = args ? JSON.stringify(args, null, 2) : '';
            } catch(e) { formattedArgs = String(args); }

            if (isStart) {
                // Activity Bar Tracking
                activeToolStates.set(`${name}-${Date.now()}`, label.replace(/`/g, ''));
                updateActivityBar();
                
                if (ind) ind.innerHTML = `<div class="dots"><div></div><div></div><div></div></div> ${label.replace(/`/g, '')}...`;
                
                const parent = ind ? chatContainer.insertBefore(document.createElement('div'), ind) : chatContainer.appendChild(document.createElement('div'));
                currentAssistantMessageDiv = null;
                currentRawContent = '';

                let innerHtml = `
                    <div class="tool-header" onclick="this.parentElement.classList.toggle('collapsed')">
                        <div class="spinner"></div> <span>${label}...</span>
                        <i data-lucide="chevron-down" class="tool-chevron" style="width:14px;height:14px;"></i>
                    </div>
                    <div class="tool-details">
                        <div style="margin-top:8px; margin-bottom: 4px; color: #888;">Arguments:</div>
                        <pre style="margin:0; padding:8px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); border-radius: 6px;"><code>${formattedArgs.replace(/</g, '&lt;')}</code></pre>
                        <div class="tool-result-container" style="display:none; margin-top:8px;">
                            <div style="margin-bottom: 4px; color: #888;">Result:</div>
                            <pre class="tool-result-pre" style="margin:0; padding:8px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); border-radius: 6px; white-space: pre-wrap; word-break: break-all;"><code></code></pre>
                        </div>
                    </div>
                `;

                parent.className = 'message assistant';
                parent.innerHTML = `
                    <div class="tool-block collapsed" id="tool-${name}-${Date.now()}">
                        ${innerHtml}
                    </div>
                `;
            } else {
                // Remove from active states (find first matching name)
                for (const key of activeToolStates.keys()) {
                    if (key.startsWith(`${name}-`)) {
                        activeToolStates.delete(key);
                        break;
                    }
                }
                updateActivityBar();

                if (ind) ind.innerHTML = `<div class="dots"><div></div><div></div><div></div></div> Thinking...`;

                // Find existing tool blocks and update the last one matching the name
                const blocks = document.querySelectorAll('.tool-block');
                if (blocks.length > 0) {
                    const last = blocks[blocks.length - 1];
                    const header = last.querySelector('.tool-header');
                    const details = last.querySelector('.tool-details');
                    
                    let extraBtn = '';
                    if (name === 'run_command') {
                        extraBtn = `<button class="badge" style="margin-left: 8px; cursor: pointer; border-color: rgba(59, 130, 246, 0.4);" onclick="event.stopPropagation(); vscode.postMessage({type: 'showTerminal'})">Terminal</button>`;
                    }
                    
                    const isError = result && typeof result === 'string' && result.toLowerCase().includes('error:');
                    
                    if (header) {
                        if (isError) {
                            header.innerHTML = `<i data-lucide="x-circle" style="width:14px;color:#ef4444"></i> <span style="color:#ef4444">Failed ${label}</span>${extraBtn}<i data-lucide="chevron-down" class="tool-chevron" style="width:14px;height:14px;"></i>`;
                        } else {
                            header.innerHTML = `<i data-lucide="check" style="width:14px;color:#10b981"></i> <span>Completed ${label}</span>${extraBtn}<i data-lucide="chevron-down" class="tool-chevron" style="width:14px;height:14px;"></i>`;
                        }
                    }
                    
                    if (details) {
                        const resultContainer = details.querySelector('.tool-result-container');
                        const resultPre = details.querySelector('.tool-result-pre code');
                        if (resultContainer && resultPre) {
                            resultContainer.style.display = 'block';
                            let safeResult = String(result).replace(/</g, '&lt;').replace(/>/g, '&gt;');
                            if (isError) {
                                resultPre.parentElement.style.borderColor = 'rgba(239, 68, 68, 0.3)';
                                resultPre.style.color = '#fca5a5';
                            }
                            resultPre.innerHTML = safeResult;
                        }
                    }
                    
                    // Special case: Plan Mode approval
                    const filePath = args?.TargetFile || args?.AbsolutePath || args?.path || '';
                    if (currentMode === 'plan' && (filePath === 'plan.md' || filePath.endsWith('/plan.md'))) {
                        const approvalDiv = document.createElement('div');
                        approvalDiv.style.marginTop = '10px';
                        approvalDiv.style.padding = '0 14px 10px 14px';
                        approvalDiv.style.display = 'flex';
                        approvalDiv.style.gap = '8px';
                        approvalDiv.innerHTML = `
                            <button class="primary-btn" style="padding: 6px 12px; font-size: 11px; margin-top:0;" onclick="approvePlan()">Approve & Run</button>
                            <button class="badge" style="cursor:pointer" onclick="addFeedback()">Add Notes</button>
                        `;
                        last.appendChild(approvalDiv);
                    }
                    
                    if (typeof lucide !== 'undefined') lucide.createIcons();
                }
            }
            scrollToBottom();
        }

        function toggleThought(headerEl) {
            const block = headerEl.closest('.thought-block');
            if (block) block.classList.toggle('collapsed');
        }

        function appendThinkingToken(token) {
            if (!currentThinkingDiv) {
                const wrapper = document.createElement('div');
                wrapper.className = 'thought-block';

                const header = document.createElement('div');
                header.className = 'thought-header';
                header.onclick = function() { toggleThought(this); };
                header.innerHTML = `
                    <div class="thought-title">
                        <i data-lucide="brain" style="width:14px;height:14px;"></i>
                        <span>Thinking Process</span>
                    </div>
                    <i data-lucide="chevron-down" class="chevron" style="width:14px;height:14px;"></i>
                `;

                const content = document.createElement('div');
                content.className = 'thought-content';

                wrapper.appendChild(header);
                wrapper.appendChild(content);
                
                const ind = document.getElementById('typing-indicator');
                if (ind) {
                    chatContainer.insertBefore(wrapper, ind);
                } else {
                    chatContainer.appendChild(wrapper);
                }
                currentThinkingDiv = content;
                currentThinkingRaw = '';
                lucide.createIcons();
            }

            currentThinkingRaw += token;
            currentThinkingDiv.innerText = currentThinkingRaw;
            scrollToBottom();
        }

        function collapseThinkingBlock() {
            if (currentThinkingDiv) {
                const block = currentThinkingDiv.closest('.thought-block');
                if (block) {
                    block.classList.add('collapsed');
                }
                currentThinkingDiv = null;
                currentThinkingRaw = '';
            }
        }

        function appendAssistantToken(token) {
            if (!currentAssistantMessageDiv) {
                const wrapper = document.createElement('div');
                wrapper.className = 'message assistant';
                wrapper.innerHTML = `
                    <div class="bubble-assistant">
                        <div class="assistant-header">
                            <div class="assistant-avatar">🌸</div>
                            <span class="assistant-name">Cycy AI</span>
                        </div>
                        <div class="content"></div>
                    </div>
                `;

                const ind = document.getElementById('typing-indicator');
                if (ind) {
                    chatContainer.insertBefore(wrapper, ind);
                } else {
                    chatContainer.appendChild(wrapper);
                }
                currentAssistantMessageDiv = wrapper.querySelector('.content');
            }

            currentRawContent += token;
            currentAssistantMessageDiv.innerHTML = parseMarkdownSimple(currentRawContent);
            scrollToBottom();
        }

        // Extremely basic markdown parser for visual fidelity
        function parseMarkdownSimple(text) {
            let html = text;
            // escape html
            html = html.replace(/</g, '&lt;').replace(/>/g, '&gt;');

            // code blocks
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
                let badge = lang ? `<div style="color: #888; font-size: 10px; margin-bottom: 6px; text-transform: uppercase;">${lang}</div>` : '';
                return `<pre>${badge}<code>${code}</code></pre>`;
            });

            // inline code
            html = html.replace(/`([^`]+)`/g, '<span class="inline-code">$1</span>');

            // bold
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

            // newlines
            html = html.replace(/\n/g, '<br/>');

            return html;
        }

        inputEl.addEventListener('focus', () => {
            inputEl.parentElement.parentElement.classList.add('focused'); // input-wrapper
        });
        inputEl.addEventListener('blur', () => {
            inputEl.parentElement.parentElement.classList.remove('focused');
        });

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function approvePlan() { inputEl.value = "Approve. Please create task.md and proceed."; sendMessage(); } function addFeedback() { inputEl.value = "I have some feedback on the plan: "; inputEl.focus(); } lucide.createIcons(); // Notify extension we are ready
        vscode.postMessage({ type: 'ready' });
    </script>
</body>
